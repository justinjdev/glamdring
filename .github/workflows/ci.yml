name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test with race detection and coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage threshold
        run: |
          threshold=50
          coverage=$(go tool cover -func=coverage.out | grep ^total: | awk '{print int($3)}')
          echo "Total coverage: ${coverage}%"
          if [ "$coverage" -lt "$threshold" ]; then
            echo "FAIL: Coverage ${coverage}% is below threshold ${threshold}%"
            exit 1
          fi
